name: CI

on:
  workflow_dispatch:

  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  test:
    timeout-minutes: 90
    runs-on: self-hosted

    env:
      testUsername: ${{ secrets.testUsername }}
      testPassword: ${{ secrets.testPassword }}
      PLAYWRIGHT_TEST_BASE_URL: ${{ secrets.PLAYWRIGHT_TEST_BASE_URL }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Verify Java
        run: |
          java -version
          echo "JAVA_HOME=$JAVA_HOME"

      # Frontend setup
      - name: Install frontend dependencies
        run: npm ci
        working-directory: helphub-webapp

      # Backend setup
      - name: Create backend .env file
        run: |
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" > .env
          echo "POSTGRES_USER=${{ secrets.POSTGRES_USER }}" >> .env
          echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env
          echo "POSTGRES_DB=${{ secrets.POSTGRES_DB }}" >> .env
          echo "PORT=4000" >> .env
        working-directory: helphub-backend

      - name: Install backend dependencies
        run: npm ci
        working-directory: helphub-backend

      - name: Start postgres container
        run: docker compose up -d db
        working-directory: helphub-backend

      - name: Wait for postgres
        run: |
          for i in {1..30}; do
            if docker compose exec -T db pg_isready -U ${{ secrets.POSTGRES_USER }}; then
              exit 0
            fi

            echo "Waiting for postgres..."
            sleep 2
          done

          echo "Postgres did not start"
          exit 1
        working-directory: helphub-backend

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: helphub-backend
        env:
          DATABASE_URL: postgresql://${{ secrets.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@localhost:5432/${{ secrets.POSTGRES_DB }}

      - name: Run Prisma migrations
        run: npx prisma migrate deploy
        working-directory: helphub-backend
        env:
          DATABASE_URL: postgresql://${{ secrets.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@localhost:5432/${{ secrets.POSTGRES_DB }}

      - name: Seed database
        run: npm run seed
        working-directory: helphub-backend
        env:
          DATABASE_URL: postgresql://${{ secrets.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@localhost:5432/${{ secrets.POSTGRES_DB }}

      - name: Start backend container
        run: docker compose up -d backend
        working-directory: helphub-backend

      - name: Wait for backend
        run: |
          for i in {1..30}; do
            if curl -f http://127.0.0.1:4000/health; then
              exit 0
            fi

            echo "Waiting for backend..."
            sleep 5
          done

          echo "Backend did not start"
          exit 1
        working-directory: helphub-backend

      - name: Show docker logs on failure
        if: failure()
        run: docker compose logs
        working-directory: helphub-backend

      # Frontend checks
      - name: Run Jest tests
        run: npm test
        working-directory: helphub-webapp

      - name: Run frontend lint
        run: npm run lint
        working-directory: helphub-webapp

      - name: Run backend lint
        run: npm run lint
        working-directory: helphub-backend

