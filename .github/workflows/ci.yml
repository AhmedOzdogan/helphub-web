name: CI

on:
  workflow_dispatch:

  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  test:
    timeout-minutes: 60

    runs-on: self-hosted

    env:
      testUsername: ${{ secrets.testUsername }}
      testPassword: ${{ secrets.testPassword }}
      PLAYWRIGHT_TEST_BASE_URL: ${{ secrets.PLAYWRIGHT_TEST_BASE_URL }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}

    defaults:
      run:
        working-directory: helphub-webapp

    steps:
      - uses: actions/checkout@v4


      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Verify Java
        run: |
          java -version
          echo "JAVA_HOME=$JAVA_HOME"

      - name: Install dependencies
        run: npm ci


      # Backend setup
      - name: Create backend .env file
        run: |
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" >> .env
          echo "POSTGRES_USER=${{ secrets.POSTGRES_USER }}" >> .env
          echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env
          echo "POSTGRES_DB=${{ secrets.POSTGRES_DB }}" >> .env
          echo "PORT=4000" >> .env
        working-directory: helphub-backend

      - name: Install backend dependencies
        run: npm ci
        working-directory: helphub-backend

      - name: Start postgres container
        run: docker compose up -d db
        working-directory: helphub-backend

      - name: Wait for postgres
        run: |
          for i in {1..30}; do
            if docker compose exec -T db pg_isready -U ${{ secrets.POSTGRES_USER }}; then
              exit 0
            fi

            echo "Waiting for postgres..."
            sleep 2
          done

          echo "Postgres did not start"
          exit 1
        working-directory: helphub-backend


      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: helphub-backend
        env:
          DATABASE_URL: postgresql://${{ secrets.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@localhost:5432/${{ secrets.POSTGRES_DB }}

      - name: Run Prisma migrations
        run: npx prisma migrate deploy
        working-directory: helphub-backend
        env:
          DATABASE_URL: postgresql://${{ secrets.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@localhost:5432/${{ secrets.POSTGRES_DB }}

      - name: Seed database
        run: npm run seed
        working-directory: helphub-backend
        env:
          DATABASE_URL: postgresql://${{ secrets.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@localhost:5432/${{ secrets.POSTGRES_DB }}

      - name: Start backend container
        run: docker compose up -d backend
        working-directory: helphub-backend

      - name: Wait for backend
        run: |
          for i in {1..30}; do
            if curl -f http://127.0.0.1:4000/health; then
              exit 0
            fi

            echo "Waiting for backend..."
            sleep 5
          done

          echo "Backend did not start"
          exit 1

      - name: Show docker logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml logs
        working-directory: helphub-backend

      # Frontend testing
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Jest tests
        run: npm test
        working-directory: helphub-webapp

      - name: Run frontend lint
        run: npm run lint
        working-directory: helphub-webapp

      - name: Run backend lint
        run: npm run lint
        working-directory: helphub-backend

      # Playwright browser testing (temporarily disabled)
      # - name: Run Chromium Playwright tests
      #   run: |
      #     pkill -f "expo" || true
      #     pkill -f "node.*8081" || true
      #     npx playwright test --project=chromium --reporter=html
      #   working-directory: helphub-webapp
      #   env:
      #     CI: true
      #     PLAYWRIGHT_TEST_BASE_URL: http://127.0.0.1:8081
      #
      # - name: Run Firefox Playwright tests
      #   run: |
      #     pkill -f "expo" || true
      #     pkill -f "node.*8081" || true
      #     npx playwright test --project=firefox --reporter=html
      #   working-directory: helphub-webapp
      #   env:
      #     CI: true
      #     PLAYWRIGHT_TEST_BASE_URL: http://127.0.0.1:8081
      #
      # - name: Run Webkit Playwright tests
      #   run: |
      #     pkill -f "expo" || true
      #     pkill -f "node.*8081" || true
      #     npx playwright test --project=webkit --reporter=html
      #   working-directory: helphub-webapp
      #   env:
      #     CI: true
      #     PLAYWRIGHT_TEST_BASE_URL: http://127.0.0.1:8081

      # Maestro Mobile E2E Testing
      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Verify Maestro installation
        run: maestro --version

      # Android setup
      - name: Setup Android SDK
        run: |
          echo "ANDROID_HOME=$HOME/Library/Android/sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/Library/Android/sdk" >> $GITHUB_ENV
          echo "$HOME/Library/Android/sdk/platform-tools" >> $GITHUB_PATH
          echo "$HOME/Library/Android/sdk/emulator" >> $GITHUB_PATH
          echo "$HOME/Library/Android/sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH

      - name: Verify Android SDK
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          adb version

      - name: Boot Android emulator
        run: |
          $ANDROID_HOME/emulator/emulator -avd Pixel_10_Pro_XL -no-window -no-audio &
          adb wait-for-device
          adb shell settings put global window_animation_scale 0
          adb shell settings put global transition_animation_scale 0
          adb shell settings put global animator_duration_scale 0

      - name: Build and install Android app
        run: |
          npx expo run:android
        working-directory: helphub-webapp

      - name: Run Android Maestro tests
        run: maestro test maestro/android
        working-directory: helphub-webapp

      # iOS setup
      - name: Boot iOS simulator
        run: |
          xcrun simctl boot "iPhone 17 Pro" || true
          open -a Simulator

      - name: Build and install iOS app
        run: |
          npx expo run:ios --device "iPhone 17 Pro"
        working-directory: helphub-webapp

      - name: Run iOS Maestro tests
        run: |
          MAESTRO_DRIVER_STARTUP_TIMEOUT=120000 maestro test maestro/ios
        working-directory: helphub-webapp

      # - name: Upload Chromium report
      #   uses: actions/upload-artifact@v4
      #   if: ${{ !cancelled() }}
      #   with:
      #     name: playwright-report-chromium
      #     path: helphub-webapp/playwright-report/
      #     retention-days: 30
      #
      # - name: Upload Firefox report
      #   uses: actions/upload-artifact@v4
      #   if: ${{ !cancelled() }}
      #   with:
      #     name: playwright-report-firefox
      #     path: helphub-webapp/playwright-report/
      #     retention-days: 30
      #
      # - name: Upload Webkit report
      #   uses: actions/upload-artifact@v4
      #   if: ${{ !cancelled() }}
      #   with:
      #     name: playwright-report-webkit
      #     path: helphub-webapp/playwright-report/
      #     retention-days: 30

      # Cleanup
      - name: Cleanup Docker
        if: always()
        run: |
          docker compose down -v
        working-directory: helphub-backend