name: CI

on:
  workflow_dispatch:

  push:
    branches:
      - main
      - master
      - develop

  pull_request:
    branches:
      - main
      - master
      - develop

jobs:
  test:
    timeout-minutes: 60

    runs-on: [self-hosted, macOS, ARM64]

    env:
      testUsername: ${{ secrets.testUsername }}
      testPassword: ${{ secrets.testPassword }}
      PLAYWRIGHT_TEST_BASE_URL: ${{ secrets.PLAYWRIGHT_TEST_BASE_URL }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}

    defaults:
      run:
        working-directory: helphub-webapp

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci


      - name: Create backend .env file
        run: |
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" >> .env
          echo "POSTGRES_USER=${{ secrets.POSTGRES_USER }}" >> .env
          echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env
          echo "POSTGRES_DB=${{ secrets.POSTGRES_DB }}" >> .env
          echo "PORT=4000" >> .env
        working-directory: helphub-backend

      - name: Install backend dependencies
        run: npm ci
        working-directory: helphub-backend

      - name: Start postgres container
        run: docker compose up -d db
        working-directory: helphub-backend


      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: helphub-backend
        env:
          DATABASE_URL: postgresql://${{ secrets.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@localhost:5432/${{ secrets.POSTGRES_DB }}

      - name: Run Prisma migrations
        run: npx prisma migrate deploy
        working-directory: helphub-backend
        env:
          DATABASE_URL: postgresql://${{ secrets.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@localhost:5432/${{ secrets.POSTGRES_DB }}

      - name: Seed database
        run: npm run seed
        working-directory: helphub-backend
        env:
          DATABASE_URL: postgresql://${{ secrets.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@localhost:5432/${{ secrets.POSTGRES_DB }}

      - name: Start backend container
        run: docker compose up -d backend
        working-directory: helphub-backend

      - name: Wait for backend
        run: |
          for i in {1..30}; do
            if curl -f http://127.0.0.1:4000/health; then
              exit 0
            fi

            echo "Waiting for backend..."
            sleep 5
          done

          echo "Backend did not start"
          exit 1

      - name: Show docker logs on failure
        if: failure()
        run: docker compose logs
        working-directory: helphub-backend

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Jest tests
        run: npm test
        working-directory: helphub-webapp

      - name: Run Playwright tests
        run: npx playwright test --project=chromium --reporter=html
        working-directory: helphub-webapp
        env:
          CI: true
          PLAYWRIGHT_TEST_BASE_URL: http://127.0.0.1:8081

      - name: Upload Chromium report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-chromium
          path: helphub-webapp/playwright-report/
          retention-days: 30

      - name: Run Firefox Playwright tests
        run: npx playwright test --project=firefox --reporter=html
        env:
          CI: true

      - name: Upload Firefox report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-firefox
          path: helphub-webapp/playwright-report/
          retention-days: 30

      - name: Run Webkit Playwright tests
        run: npx playwright test --project=webkit --reporter=html
        env:
          CI: true

      - name: Upload Webkit report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-webkit
          path: helphub-webapp/playwright-report/
          retention-days: 30