      # iOS setup
      - name: Boot iOS simulator
        run: |
          xcrun simctl shutdown all || true
          xcrun simctl boot "iPhone 17 Pro" || true
          xcrun simctl bootstatus "iPhone 17 Pro" -b
          open -a Simulator
          sleep 15

      - name: Restart Metro for iOS
        run: |
          pkill -f "expo" || true
          pkill -f "node.*8081" || true

          nohup npx expo start --dev-client --clear > metro-ios.log 2>&1 &

          sleep 25
        working-directory: helphub-webapp

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update
        working-directory: helphub-webapp

      - name: Build and install iOS app
        run: |
          npx expo run:ios \
            --device "iPhone 17 Pro"
        working-directory: helphub-webapp
        env:
          CI: true
          NODE_ENV: test

      - name: Wait for iOS app to open
        run: |
          xcrun simctl bootstatus "iPhone 17 Pro" -b
          sleep 30

      - name: Run iOS Maestro tests
        run: |
          maestro test maestro/ios --format junit
        working-directory: helphub-webapp
        env:
          MAESTRO_DRIVER_STARTUP_TIMEOUT: 180000

      # - name: Run Android Maestro tests
      #   run: maestro test maestro/android
      #   working-directory: helphub-webapp

      # Cleanup
      - name: Cleanup Docker
        if: always()
        run: docker compose down -v
        working-directory: helphub-backend