services:
  backend:
    build: .
    container_name: helphub-backend
    ports:
      - "4000:4000"
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - .:/app
      - /app/node_modules

  db:
    image: postgres:17
    container_name: helphub-postgres
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - helphub_postgres_data:/var/lib/postgresql

volumes:
  helphub_postgres_data: