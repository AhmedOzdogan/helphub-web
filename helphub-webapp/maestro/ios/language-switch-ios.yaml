appId: com.anonymous.helphub-webapp
---
- launchApp:
    clearState: true

- runFlow: 
    label: "Check navbar is visible"
    commands: 
        - assertVisible: "Open mobile menu"
        - assertVisible: "HelpHub"
        - assertVisible: "Toggle account menu"
        - assertVisible: "Open language menu"


- runFlow: 
    label: "Check language menu is working"
    commands: 
        - tapOn: "Open language menu"
        - assertVisible:
            id: "en"
        - assertVisible:
            id: "it"
        - tapOn:
            id: "it"
        - assertVisible: "Cerca..."

        - tapOn: "Open language menu"
        - tapOn:
            id: "de"
        - assertVisible: "Suchen..."






